<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Governance Reports - EcoSphere AI</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-wrapper">
            <div id="navbar-container"></div>
            
            <div class="content-body">
                <!-- Controls row -->
                <div class="controls-row">
                    <div style="display: flex; gap: 12px; flex-grow: 1;">
                        <div class="search-input-wrapper">
                            <i class="fas fa-search"></i>
                            <input type="text" id="search-box" class="search-control" placeholder="Search description..." oninput="handleSearch()">
                        </div>
                        <select id="filter-status" class="filter-select" onchange="handleFilter()">
                            <option value="">All Statuses</option>
                            <option value="pending">Pending Review</option>
                            <option value="investigating">Investigating</option>
                            <option value="resolved">Resolved</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="openAddModal()">
                        <i class="fas fa-bullhorn"></i> File Compliance Report
                    </button>
                </div>

                <!-- Governance Table -->
                <div class="table-responsive">
                    <table class="custom-table">
                        <thead>
                            <tr>
                                <th>Report Date</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Description</th>
                                <th style="text-align: right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="governance-tbody">
                            <tr>
                                <td colspan="5" style="text-align: center; color: var(--text-secondary);">Loading compliance audits...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination footer -->
                <div class="pagination-footer">
                    <div style="font-size: 14px; color: var(--text-secondary);" id="pagination-info">
                        Showing 0 to 0 of 0 entries
                    </div>
                    <div class="pagination-buttons">
                        <button class="page-btn" id="prev-btn" onclick="changePage(-1)" disabled>Previous</button>
                        <button class="page-btn" id="next-btn" onclick="changePage(1)" disabled>Next</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Record Modal -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal-box">
            <div class="modal-title">File Governance / Compliance Report</div>
            <form id="add-form" onsubmit="handleCreateSubmit(event)">
                <div class="form-group">
                    <label for="metric-type">Report Category</label>
                    <select id="metric-type" class="form-control" required>
                        <option value="">Select category...</option>
                        <option value="whistleblower_reports">Whistleblower / Anonymous Complaint</option>
                        <option value="policy_violations">Policy Violation Report</option>
                        <option value="board_diversity">Board Composition / Audit</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="metric-value">Scope Value (e.g. 1.00 for counts)</label>
                    <input type="number" step="any" id="metric-value" class="form-control" value="1.0" required>
                </div>
                <div class="form-group">
                    <label for="metric-date">Incident / Audit Date</label>
                    <input type="date" id="metric-date" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="metric-desc">Details / Description</label>
                    <textarea id="metric-desc" class="form-control" rows="4" placeholder="Detail the complaint or audit scope anonymously..." required></textarea>
                </div>
                <div class="form-buttons">
                    <button type="button" class="btn-secondary" onclick="closeAddModal()">Cancel</button>
                    <button type="submit" class="btn-primary">File Report</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/layout.js"></script>
    <script>
        let currentPage = 1;
        let currentLimit = 10;
        let searchQuery = "";
        let filterStatus = "";

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("metric-date").value = new Date().toISOString().split('T')[0];
            loadGovernanceRecords();
        });

        async function loadGovernanceRecords() {
            try {
                let endpoint = `/governance?page=${currentPage}&limit=${currentLimit}`;
                if (filterStatus) {
                    endpoint += `&status=${filterStatus}`;
                }
                if (searchQuery) {
                    endpoint += `&search=${encodeURIComponent(searchQuery)}`;
                }
                
                const res = await apiCall(endpoint);
                if (res && res.success) {
                    populateTable(res.data);
                }
            } catch (err) {
                showToast(err.message || "Failed to load governance records.", "error");
            }
        }

        function populateTable(data) {
            const tbody = document.getElementById("governance-tbody");
            tbody.innerHTML = "";
            
            if (data.items.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-secondary);">No records found.</td></tr>`;
                document.getElementById("pagination-info").textContent = "Showing 0 to 0 of 0 entries";
                document.getElementById("prev-btn").disabled = true;
                document.getElementById("next-btn").disabled = true;
                return;
            }

            data.items.forEach(rec => {
                const tr = document.createElement("tr");
                let actionBtn = "";
                
                // Show resolution trigger if status is not resolved
                if (rec.status !== "resolved") {
                    actionBtn = `
                        <button class="btn-primary" style="padding: 6px 12px; font-size: 13px; background: var(--success-color);" onclick="updateStatus('${rec.id}', 'resolved')">
                            <i class="fas fa-check"></i> Resolve
                        </button>
                    `;
                } else {
                    actionBtn = `
                        <span style="font-size: 13px; color: var(--text-muted); font-weight: 500;">
                            <i class="fas fa-circle-check"></i> Archived
                        </span>
                    `;
                }

                tr.innerHTML = `
                    <td style="font-weight: 500;">${rec.recorded_date}</td>
                    <td><span style="font-weight: 600;">${formatCategory(rec.metric_type)}</span></td>
                    <td><span class="badge ${getStatusBadgeClass(rec.status)}">${rec.status.toUpperCase()}</span></td>
                    <td style="color: var(--text-secondary); max-width: 300px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">${rec.description || "—"}</td>
                    <td style="text-align: right; display: flex; gap: 8px; justify-content: flex-end; align-items: center;">
                        ${actionBtn}
                        <button class="btn-secondary" style="padding: 6px 12px; font-size: 13px;" onclick="deleteRecord('${rec.id}')">
                            <i class="fas fa-trash-alt" style="color: var(--error-color);"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            const start = (data.page - 1) * data.limit + 1;
            const end = Math.min(start + data.items.length - 1, data.total);
            document.getElementById("pagination-info").textContent = `Showing ${start} to ${end} of ${data.total} entries`;
            
            document.getElementById("prev-btn").disabled = data.page <= 1;
            document.getElementById("next-btn").disabled = data.page >= data.pages;
        }

        function formatCategory(type) {
            if (type === "whistleblower_reports") return "Whistleblower Complaint";
            if (type === "policy_violations") return "Policy Violation";
            if (type === "board_diversity") return "Board Composition Audit";
            return type;
        }

        function getStatusBadgeClass(status) {
            if (status === "resolved") return "badge-active";
            if (status === "pending") return "badge-inactive";
            return "badge-pending"; // Investigating
        }

        function handleSearch() {
            searchQuery = document.getElementById("search-box").value.trim();
            currentPage = 1;
            loadGovernanceRecords();
        }

        function handleFilter() {
            filterStatus = document.getElementById("filter-status").value;
            currentPage = 1;
            loadGovernanceRecords();
        }

        function changePage(direction) {
            currentPage += direction;
            loadGovernanceRecords();
        }

        function openAddModal() {
            document.getElementById("add-modal").classList.add("active");
        }

        function closeAddModal() {
            document.getElementById("add-modal").classList.remove("active");
            document.getElementById("add-form").reset();
            document.getElementById("metric-date").value = new Date().toISOString().split('T')[0];
        }

        async function handleCreateSubmit(event) {
            event.preventDefault();
            const metric_type = document.getElementById("metric-type").value;
            const value = parseFloat(document.getElementById("metric-value").value);
            const recorded_date = document.getElementById("metric-date").value;
            const description = document.getElementById("metric-desc").value.trim();
            
            let user_id = "00000000-0000-0000-0000-000000000000";
            try {
                const empRes = await apiCall("/employees?limit=1");
                if (empRes && empRes.success && empRes.data.items.length > 0) {
                    user_id = empRes.data.items[0].id;
                }
            } catch (e) {}

            try {
                const res = await apiCall("/governance", {
                    method: "POST",
                    body: JSON.stringify({ user_id, metric_type, value, status: "pending", recorded_date, description })
                });
                if (res && res.success) {
                    showToast("Governance compliance report filed anonymously!");
                    closeAddModal();
                    loadGovernanceRecords();
                }
            } catch (err) {
                showToast(err.message || "Failed to file report.", "error");
            }
        }

        async function updateStatus(id, newStatus) {
            try {
                // To update we must send the updated fields.
                // Our schema allows updating status. Let's send PUT request to `/governance/{id}`.
                const res = await apiCall(`/governance/${id}`, {
                    method: "PUT",
                    body: JSON.stringify({ status: newStatus })
                });
                if (res && res.success) {
                    showToast("Report status updated successfully!");
                    loadGovernanceRecords();
                }
            } catch (err) {
                showToast(err.message || "Failed to update status.", "error");
            }
        }

        async function deleteRecord(id) {
            if (!confirm("Are you sure you want to delete this case report?")) return;
            try {
                const res = await apiCall(`/governance/${id}`, {
                    method: "DELETE"
                });
                if (res && res.success) {
                    showToast("Case report deleted successfully!");
                    loadGovernanceRecords();
                }
            } catch (err) {
                showToast(err.message || "Failed to delete case report.", "error");
            }
        }
    </script>
</body>
</html>

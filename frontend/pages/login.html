<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSphere AI - Sign In</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.05) 0%, #f8fafc 90%);
        }
        .login-card {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-brand">
                    <span class="eco">Ec</span><span class="logo-o"><i class="fas fa-globe-americas globe"></i><i class="fas fa-leaf leaf"></i></span><span class="sphere">Sphere</span><span class="ai-badge">AI</span>
                </div>
                <p>Enterprise ESG Intelligence Platform</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="user@ecosphere.ai" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" id="email-signin-btn" style="width: 100%; justify-content: center; margin-top: 12px;">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
                <button type="button" class="btn-secondary" id="email-signup-btn" style="width: 100%; justify-content: center; margin-top: 12px;">
                    <i class="fas fa-user-plus"></i> Sign Up
                </button>
                
                <div style="text-align: center; margin: 24px 0; color: var(--text-secondary); position: relative;">
                    <hr style="border: 0; border-top: 1px solid var(--surface-border); position: absolute; width: 100%; top: 50%;">
                    <span style="background: #ffffff; padding: 0 10px; position: relative;">OR</span>

                    Sign in with Google
                </button>

                <div style="margin-top: 20px; text-align: center; font-size: 13px; color: var(--text-secondary);">
                    <span>- Or Demo Mode Evaluation -</span>
                </div>
                <button type="button" class="btn-primary" id="demo-login-btn" style="width: 100%; justify-content: center; margin-top: 12px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); border: none; color: #fff;">
                    <i class="fa fa-key" style="margin-right: 8px;"></i> Sign In as Administrator (Demo)
                </button>
            </form>
        </div>
    </div>

    <script src="../assets/layout.js"></script>
    <script type="module">
        import { handleGoogleSignIn, handleEmailSignIn, handleEmailSignUp } from '../assets/js/auth.js';
        
        document.getElementById('demo-login-btn').addEventListener('click', () => {
            localStorage.setItem("token", "mock-admin-uid");
            localStorage.setItem("user_email", "admin@ecosphere.ai");
            localStorage.setItem("user_role", "admin");
            window.location.href = "dashboard.html";
        });

        document.getElementById('google-signin-btn').addEventListener('click', () => {
            handleGoogleSignIn();
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            if (email && password) {
                handleEmailSignIn(email, password);
            }
        });

        document.getElementById('email-signup-btn').addEventListener('click', () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            if (email && password) {
                handleEmailSignUp(email, password);
            } else {
                alert("Please enter email and password to sign up.");
            }
        });
        
        // Redirect if already authenticated
        if (localStorage.getItem("token")) {
            window.location.href = "dashboard.html";
        }
    </script>

</html>
